name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20.x, 22.x]
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check file sizes
        run: pnpm run check:size

      - name: Check permanent rules slice + builtins barrel are in sync
        # Regenerates `packages/core/src/classify_entry_points/registry.permanent.json`
        # and `builtins/index.ts` from the skill registry, then asserts a clean
        # diff. Catches drift between the registry and the bundled core slice.
        run: pnpm run check-permanent-rules

      - name: Run tests
        run: pnpm test

      - name: Check packages
        run: |
          pnpm --filter @ariadnejs/types pack --pack-destination /tmp
          pnpm --filter @ariadnejs/core pack --pack-destination /tmp
          pnpm --filter @ariadnejs/mcp pack --pack-destination /tmp

      - name: Self-analysis validation
        # Run validation but don't fail the build yet (accuracy improvements in progress)
        continue-on-error: true
        run: |
          echo "🔍 Running Ariadne self-analysis validation..."
          pnpm exec tsx packages/core/agent-validation/ci-validation.ts || echo "⚠️ Validation thresholds not met (expected during development)"